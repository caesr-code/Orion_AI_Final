<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Orion</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
overflow:hidden;
color:white;
background:
radial-gradient(circle at top right, rgba(140,40,255,0.35), transparent 45%),
radial-gradient(circle at bottom left, rgba(90,0,180,0.25), transparent 55%),
linear-gradient(135deg,#030303,#070012,#120024,#050505);
}

/* ===== CANVAS ===== */
#space{
position:fixed;
inset:0;
z-index:-2;
}

/* ===== SIDEBAR ===== */
.sidebar{
position:fixed;
left:0;
top:0;
width:70px;
height:100vh;
background:rgba(10,10,10,0.75);
border-right:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
padding-top:15px;
backdrop-filter:blur(10px);
z-index: 30;
}

.side-btn,.book-select{
width:48px;height:48px;
border:none;
border-radius:12px;
background:#151515;
color:white;
cursor:pointer;
transition:0.2s;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
}

.book-select {
padding-left: 10px;
appearance: none;
-webkit-appearance: none;
}

.side-btn:hover,.book-select:hover{background:#222;transform:scale(1.05);}
.side-btn:active{transform:scale(0.95);}

/* ===== MAIN ===== */
.main{
margin-left:70px;
height:100vh;
display:flex;
flex-direction:column;
position: relative;
z-index: 1;
}

.welcome{
text-align:center;
margin-top:8vh;
}

.logo{
width:min(70vw, 420px);
height:min(70vw, 420px);
margin:0 auto;
border-radius:50%;
object-fit:cover;
filter:drop-shadow(0 0 60px rgba(140,90,255,0.45));
}

/* ===== CHAT ===== */
.chat{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:14px;
}

.hidden{display:none !important;}

.message-wrap{
display:flex;
flex-direction:column;
}

.user-wrap{align-items:flex-end;}
.orion-wrap{align-items:flex-start;}

.sender{
font-size:12px;
opacity:0.6;
margin-bottom:4px;
}

.message{
max-width:70%;
padding:14px 16px;
border-radius:14px;
word-break:break-word;
line-height: 1.6;
}

.user{background:rgba(70,70,70,0.85);}
.orion{background:rgba(18,18,18,0.85);border:1px solid rgba(255,255,255,0.08); white-space: pre-wrap;}

/* ===== INPUT ===== */
.input-bar{
padding:18px;
position:relative;
}

textarea{
width:100%;
resize:none;
border:none;
outline:none;
padding:16px;
padding-right:60px;
border-radius:16px;
background:rgba(15,15,15,0.9);
color:white;
}

.send{
position:absolute;
right:25px;
bottom:28px;
width:40px;
height:40px;
border-radius:50%;
border:none;
background:white;
color:black;
cursor:pointer;
font-weight: bold;
}

/* ===== PANEL ===== */
.panel{
position:fixed;
left:-420px;
top:0;
width:420px;
height:100vh;
background:#111;
border-right:1px solid #222;
padding:20px;
transition:0.25s;
z-index:20;
overflow-y:auto;
display: flex;
flex-direction: column;
}

.panel.open{left:70px;}

.panel h3 {
margin-bottom: 15px;
}

.panel-actions {
margin-top: auto;
padding-top: 15px;
}

.panel-actions button {
width: 100%;
padding: 12px;
background: #8c28ff;
border: none;
color: white;
border-radius: 8px;
cursor: pointer;
font-weight: bold;
transition: 0.2s;
}

.panel-actions button:hover {
background: #a24eff;
}

#chars {
flex: 1;
overflow-y: auto;
margin-bottom: 15px;
}

.character{
border:1px solid #333;
border-radius:12px;
padding:12px;
margin-bottom:12px;
position: relative;
background: #151515;
}

.character input,.character select{
width:100%;
margin:4px 0;
padding:10px;
background:#1a1a1a;
border:1px solid #252525;
border-radius: 6px;
color:white;
}

.delete-char-btn {
position: absolute;
top: 8px;
right: 8px;
background: transparent;
border: none;
color: #ff4d4d;
cursor: pointer;
font-size: 14px;
}

/* ===== MODAL ===== */
.modal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.75);
z-index:100;
}

.modal-box{
width:420px;
background:#121212;
border:1px solid #333;
padding:20px;
border-radius:14px;
}

.modal-box input{
width:100%;
margin-top:10px;
padding:10px;
background:#1a1a1a;
border:1px solid #333;
border-radius: 6px;
color:white;
}

.modal-buttons {
display: flex;
gap: 10px;
margin-top: 15px;
justify-content: flex-end;
}

.modal-buttons button {
padding: 8px 16px;
border: none;
border-radius: 6px;
cursor: pointer;
font-weight: bold;
}

.btn-confirm { background: white; color: black; }
.btn-cancel { background: #222; color: white; }

/* DELETE WARNING STYLE */
.danger{
color:#ff4d4d;
font-size:12px;
margin-top:8px;
}

/* TYPING INDICATOR STYLE */
.typing-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  background-color: white;
  border-radius: 50%;
  margin-right: 4px;
  animation: wave 1.3s linear infinite;
}
.typing-dot:nth-child(2) { animation-delay: -1.1s; }
.typing-dot:nth-child(3) { animation-delay: -0.9s; }

@keyframes wave {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}
</style>
</head>

<body>

<canvas id="space"></canvas>

<div class="sidebar">
<button class="side-btn" onclick="handleNew()" title="New Book">✏️</button>
<button class="side-btn" onclick="togglePanel()" title="Characters">👤</button>

<select class="book-select" id="bookSelect" onchange="switchBook(this.value)" title="Select Book">
</select>

<button class="side-btn" onclick="openDelete()" title="Delete Book">🗑️</button>
</div>

<div class="panel" id="panel">
<h3>Characters</h3>
<div id="chars"></div>
<div class="panel-actions">
<button onclick="handleAddCharBtn()">+ Add Character</button>
</div>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<h3 id="modalTitle">Action</h3>
<p id="modalText"></p>
<input id="modalInput" placeholder="Enter name...">
<p class="danger" id="dangerText"></p>
<div class="modal-buttons">
<button class="btn-cancel" onclick="closeModal()">Cancel</button>
<button class="btn-confirm" onclick="confirmModal()">Confirm</button>
</div>
</div>
</div>

<div class="main">

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
<script>
/* ===== STARFIELD BACKGROUND ===== */
const c=document.getElementById("space");
const x=c.getContext("2d");
let stars=[];

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
resize();
addEventListener("resize",resize);

for(let i=0;i<130;i++){
stars.push({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
vx:(Math.random()-0.5)*0.2,
vy:(Math.random()-0.5)*0.2
});
}

function loop(){
x.clearRect(0,0,c.width,c.height);
for(let s of stars){
s.x+=s.vx; s.y+=s.vy;
if(s.x<0)s.x=c.width; if(s.y<0)s.y=c.height;
if(s.x>c.width)s.x=0; if(s.y>c.height)s.y=0;
x.beginPath(); x.arc(s.x,s.y,1.4,0,Math.PI*2);
x.fillStyle="white"; x.fill();
}
for(let i=0;i<stars.length;i++){
for(let j=i+1;j<stars.length;j++){
let dx=stars[i].x-stars[j].x;
let dy=stars[i].y-stars[j].y;
let d=Math.sqrt(dx*dx+dy*dy);
if(d<90){
x.beginPath(); x.moveTo(stars[i].x,stars[i].y); x.lineTo(stars[j].x,stars[j].y);
x.strokeStyle=`rgba(255,255,255,${1-d/90})`; x.stroke();
}
}
}
requestAnimationFrame(loop);
}
loop();

/* ===== CORE STATE MANAGEMENT ===== */
let books=JSON.parse(localStorage.getItem("orion"))||[];
let current=null;
let mode="";

/* ===== ORION LOCAL BRAIN (ONNX, runs fully in-browser, no server) ===== */
let orionSession = null;
let orionVocab = null;
let orionWord2Idx = null;
let orionGenreBrain = null;
let trainingCorpusText = null;
const ORION_HIDDEN_DIM = 512;
const ORION_NUM_LAYERS = 3;

async function loadOrionBrain(){
    try {
        ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/";
        ort.env.wasm.numThreads = 1;
        ort.env.wasm.simd = true;

        // Load vocabulary
        const vocabResp = await fetch("vocab.json");
        orionVocab = await vocabResp.json();
        orionWord2Idx = {};
        orionVocab.forEach((w, i) => { orionWord2Idx[w] = i; });

        try {
            const corpusResp = await fetch("training_corpus.txt");
            trainingCorpusText = await corpusResp.text();
        } catch (corpusErr) {
            console.warn("No training corpus available yet.", corpusErr);
        }

        try {
            const brainResp = await fetch("brain/index.json");
            if(brainResp.ok) {
                orionGenreBrain = await brainResp.json();
            }
        } catch (brainErr) {
            console.warn("No genre brain memory found yet.", brainErr);
        }

        // Load the self-contained ONNX model so the browser runtime does not need the external .data file.
        orionSession = await ort.InferenceSession.create("orion_single.onnx", {
            executionProviders: ['wasm']
        });

        console.log("✅ Orion's brain loaded:", orionVocab.length, "words");
        const statusEl = document.getElementById("orionStatus");
        const memoryLabel = orionGenreBrain && orionGenreBrain.genres ? " + genre memory" : "";
        if(statusEl) statusEl.innerText = "✅ Orion's brain is ready (" + orionVocab.length + " words" + memoryLabel + ")";
    } catch(err) {
        console.error("Failed to load Orion's brain:", err);
        const statusEl = document.getElementById("orionStatus");
        if(statusEl) statusEl.innerText = "❌ Failed to load Orion's brain (see console)";
    }
}

/* Simple word-level tokenizer matching the training vocab */
function orionTokenize(text){
    return text.toLowerCase().match(/[a-zA-Z']+|[.,]/g) || [];
}

function corpusTokenize(text){
    return text.toLowerCase().match(/[a-z0-9']+/g) || [];
}

function inferGenreFromPrompt(prompt){
    const text = prompt.toLowerCase();
    const genreMap = [
        ["classroom_drama", /classroom|drama|teacher|student|play|rehearsal|audience|scene|curtain|monologue|school/i],
        ["mystery", /mystery|detective|clue|secret|suspect|hidden|case|whisper|locker|investig/i],
        ["fantasy", /fantasy|dragon|magic|spell|wizard|enchanted|moonlit|kingdom|castle|myth/i],
        ["science_fiction", /sci[- ]?fi|robot|space|planet|future|cyber|ai|galaxy|neural|lab/i],
        ["romance", /romance|love|kiss|heart|crush|boyfriend|girlfriend|wedding|passion/i],
        ["thriller", /thriller|danger|alarm|chase|shadow|dark|panic|deadly|hunter|attack/i],
        ["horror", /horror|ghost|haunted|creature|spirit|curse|blood|nightmare|grave/i],
        ["comedy", /comedy|funny|joke|laugh|silly|goofy|clown|banter|ridiculous/i],
        ["adventure", /adventure|quest|journey|map|tunnel|explore|island|treasure|mission/i],
        ["historical", /historical|century|royal|castle|empire|victorian|medieval|ancient|war/i],
        ["dystopian", /dystopian|future city|ruined|rebellion|system|control|dictator|surveillance/i],
    ];
    for(const [genre, regex] of genreMap){
        if(regex.test(text)) return genre;
    }
    return "classroom_drama";
}

function analyzePrompt(prompt){
    const text = prompt.toLowerCase();
    const profile = {
        genre: inferGenreFromPrompt(prompt),
        tone: /dark|tense|scary|danger|shadow|panic|deadly/.test(text) ? "tense" : /funny|joke|laugh|silly/.test(text) ? "playful" : /romance|love|heart/.test(text) ? "romantic" : "dramatic",
        mood: /sad|lonely|broken|grief|fear|lost/.test(text) ? "melancholic" : /hope|joy|bright|cheer|smile/.test(text) ? "hopeful" : "intense",
        setting: /school|classroom|teacher|student|play/.test(text) ? "classroom" : /space|planet|rocket|galaxy|robot/.test(text) ? "future" : /castle|kingdom|forest|dragon/.test(text) ? "fantasy world" : "modern setting",
        focus: /girl|boy|student|teacher|detective|warrior|mage|robot|hero/.test(text) ? "character-driven" : "scene-driven",
    };
    return profile;
}

async function fetchGenreCorpus(prompt){
    const profile = analyzePrompt(prompt);
    const candidates = new Set([profile.genre, "classroom_drama", "mystery", "fantasy", "science_fiction"]);

    let combined = "";
    if(orionGenreBrain && orionGenreBrain.genres){
        for(const genre of candidates){
            const entry = orionGenreBrain.genres[genre];
            if(!entry || !entry.corpus) continue;
            try {
                const resp = await fetch(entry.corpus);
                if(resp.ok) {
                    const text = await resp.text();
                    combined += "\n\n" + text;
                }
            } catch (err) {
                console.warn("Genre corpus fetch failed for", genre, err);
            }
        }
    }

    return (combined || trainingCorpusText || "").trim();
}

function buildCorpusModel(text){
    const words = corpusTokenize(text);
    const model = {};
    for(let i = 0; i < words.length - 1; i++){
        const key = words[i];
        if(!model[key]) model[key] = [];
        model[key].push(words[i + 1]);
    }
    return model;
}

function sampleWeighted(list){
    const i = Math.floor(Math.random() * list.length);
    return list[i];
}

function containsBlockedGenreTag(text){
    return /\[genre:\s*[^\]]+\]/i.test(text);
}

function blockGenreTagPrompt(text){
    return containsBlockedGenreTag(text || "");
}

function sanitizeGeneratedText(text){
    return (text || "")
        .replace(/\[genre:\s*[^\]]+\]/gi, " ")
        .replace(/\s{2,}/g, " ")
        .trim();
}

function buildTeachingPrompt(text){
    const cleaned = sanitizeGeneratedText(text || "");
    return [
        cleaned,
        "Avoid placeholder genre labels like [genre: modern_fantasy] or [genre: mystery].",
        "Write natural story prose instead of bracketed tags."
    ].filter(Boolean).join(" ");
}

function generateFromCorpus(prompt, corpusText, maxWords = 60){
    const words = corpusTokenize(prompt);
    if(words.length === 0 || !corpusText) return "";

    const model = buildCorpusModel(corpusText);
    const seedWords = words.slice(-4);
    if(seedWords.length === 0) return "";

    let chain = seedWords.slice();
    let current = seedWords[seedWords.length - 1];

    for(let i = 0; i < maxWords; i++){
        const nextWords = model[current] || [];
        if(nextWords.length === 0) break;
        const next = sampleWeighted(nextWords);
        chain.push(next);
        current = next;
    }

    return chain.join(" ");
}

function orionEncode(text, maxLen=50){
    const tokens = orionTokenize(text);
    let ids = tokens.map(t => (t in orionWord2Idx) ? orionWord2Idx[t] : orionWord2Idx["a"]);
    ids = ids.slice(-maxLen);
    if(ids.length === 0) ids = [orionWord2Idx["a"]];
    return ids;
}

function orionLastTokenLogits(logits, dims, vocabSize){
    const flattened = Array.from(logits);
    const seqLen = dims && dims.length > 1 ? dims[dims.length - 2] : 1;
    const start = Math.max(0, (seqLen - 1) * vocabSize);
    return flattened.slice(start, start + vocabSize);
}

/* Run Orion's GRU model token-by-token to generate text */
async function generateOrionText(prompt, maxNewTokens=40, temperature=0.8){
    const promptBased = await fetchGenreCorpus(prompt);
    if(promptBased && promptBased.length > 80){
        const rawGenerated = generateFromCorpus(prompt, promptBased, maxNewTokens);
        const sanitized = sanitizeGeneratedText(rawGenerated);
        if(sanitized) return sanitized;
    }

    if(!orionSession || !orionVocab) {
        return "❌ Orion's brain is still loading. Please wait a moment and try again.";
    }

    const promptIds = orionEncode(prompt);

    // Initial hidden state: zeros, shape [num_layers, batch=1, hidden_dim]
    let hiddenData = new Float32Array(ORION_NUM_LAYERS * 1 * ORION_HIDDEN_DIM);
    let hiddenTensor = new ort.Tensor("float32", hiddenData, [ORION_NUM_LAYERS, 1, ORION_HIDDEN_DIM]);

    // Feed the full prompt to build up hidden state. The model returns logits
    // for the final position only (shape [1, 1, 188]), which we use as the
    // first prediction so the last prompt token isn't processed twice.
    let inputTensor = new ort.Tensor("int64", BigInt64Array.from(promptIds.map(BigInt)), [1, promptIds.length]);
    let results = await orionSession.run({ input_ids: inputTensor, initial_hidden_state: hiddenTensor });
    hiddenTensor = results.final_hidden_state;

    const generatedWords = [];
    let pendingLogits = results.logits.data;
    let pendingDims = results.logits.dims || [1, promptIds.length, orionVocab.length];

    for(let step = 0; step < maxNewTokens; step++){
        const logits = orionLastTokenLogits(pendingLogits, pendingDims, orionVocab.length);
        const promptWords = new Set(orionTokenize(prompt).map(w => w.toLowerCase()));
        const scaled = logits.map((value, idx) => {
            const word = (orionVocab[idx] || "").toLowerCase();
            const promptBoost = promptWords.has(word) ? 0.35 : 0;
            return (value + promptBoost) / temperature;
        });

        // Softmax
        const maxLogit = Math.max(...scaled);
        const exps = scaled.map(v => Math.exp(v - maxLogit));
        const sumExps = exps.reduce((a,b) => a+b, 0);
        const probs = exps.map(v => v / sumExps);

        // Sample from the distribution
        let r = Math.random();
        let cumulative = 0;
        let chosenIdx = probs.length - 1;
        for(let i = 0; i < probs.length; i++){
            cumulative += probs[i];
            if(r <= cumulative){ chosenIdx = i; break; }
        }

        const word = orionVocab[chosenIdx] || "";
        generatedWords.push(word);

        // Run the chosen token through the model to get the next prediction
        inputTensor = new ort.Tensor("int64", BigInt64Array.from([BigInt(chosenIdx)]), [1, 1]);
        results = await orionSession.run({ input_ids: inputTensor, initial_hidden_state: hiddenTensor });
        hiddenTensor = results.final_hidden_state;
        pendingLogits = results.logits.data;
        pendingDims = results.logits.dims || [1, 1, orionVocab.length];
    }

    const rawGenerated = generatedWords.join(" ").trim();
    return sanitizeGeneratedText(rawGenerated);
}

/* ===== DATA LOCALSTORAGE SYNC ===== */
function save(){
localStorage.setItem("orion",JSON.stringify(books));
updateSelect();
}

function updateSelect(){
let select = document.getElementById("bookSelect");
select.innerHTML = "";
if(books.length === 0){
let opt = document.createElement("option");
opt.innerText = "📚 No Books";
select.appendChild(opt);
return;
}
books.forEach(b => {
let opt = document.createElement("option");
opt.value = b.id;
opt.innerText = b.title.length > 12 ? b.title.substring(0,10)+"..." : b.title;
if(current && b.id === current.id) opt.selected = true;
select.appendChild(opt);
});
}

/* ===== BOOK ACTIONS ===== */
function createBook(name="Untitled Book"){
let b={
id:Date.now(),
title:name,
messages:[],
chars:[]
};
books.push(b);
current=b;
save();
render();
syncCharacters();
}

function switchBook(id){
current=books.find(b=>b.id==id);
if(!current) return;
render();
syncCharacters();
}

function handleNew(){
if(current && current.title.startsWith("Untitled Book") && current.messages.length === 0){
return; 
}
if(current && current.title.startsWith("Untitled Book")){
document.getElementById("modalInput").removeAttribute("hidden");
openModal("rename","Name your book before starting a new one.","This saves your current workspace session.");
return;
}
createBook();
}

function openDelete(){
if(!current) return;
document.getElementById("modalInput").setAttribute("hidden", "true");
openModal("delete","Delete this book?",`WARNING: "${current.title}" will be permanently removed.`);
}

/* ===== MODAL CONFIGURATION ===== */
function openModal(m,text,extra){
mode=m;
document.getElementById("modalTitle").innerText = m.toUpperCase();
document.getElementById("modalText").innerText=text;
document.getElementById("dangerText").innerText=extra||"";
document.getElementById("modal").style.display="flex";
document.getElementById("modalInput").value="";
}

function closeModal(){
document.getElementById("modal").style.display="none";
document.getElementById("modalInput").removeAttribute("hidden");
}

function confirmModal(){
let val=document.getElementById("modalInput").value.trim();
if(mode==="rename"){
current.title=val||"Untitled Book";
save();
createBook();
}
if(mode==="delete"){
books=books.filter(b=>b.id!==current.id);
if(books.length > 0){
current = books[books.length - 1];
render();
syncCharacters();
} else {
current=null;
resetUI();
}
save();
}
closeModal();
}

function resetUI(){
document.getElementById("chat").innerHTML="";
document.getElementById("chat").classList.add("hidden");
document.getElementById("welcome").classList.remove("hidden");
document.getElementById("chars").innerHTML="";
updateSelect();
}

/* ===== TOGGLE SIDE PANELS ===== */
function togglePanel(){
document.getElementById("panel").classList.toggle("open");
}

/* ===== LIVE CHAPTER CONNECTION ENGINE ===== */
async function send(){
let i=document.getElementById("input");
let textPrompt = i.value.trim();
if(!textPrompt) return;

if(!current) createBook();

current.messages.push({sender:"user",content:textPrompt});

// Keep the user's creative idea intact, but train the generation path to
// ignore placeholder genre labels such as [genre: modern_fantasy].
const generationPrompt = buildTeachingPrompt(textPrompt);

const profile = analyzePrompt(generationPrompt);

if(!current) createBook();

document.getElementById("welcome").classList.add("hidden");
document.getElementById("chat").classList.remove("hidden");

// Render the user's original prompt immediately so the creative idea stays visible.
render();
i.value="";

// Extract active character names from panel
let charactersArray = current.chars
    .map(c => c.name ? c.name.trim() : "")
    .filter(name => name !== "");

// Render real-time typing indicator inside chat frame
let chat = document.getElementById("chat");
let loaderWrap = document.createElement("div");
loaderWrap.className = "message-wrap orion-wrap";
loaderWrap.id = "orion-loader";
loaderWrap.innerHTML = `
<div class="sender">⭐ Orion</div>
<div class="message orion">
  <span class="typing-dot"></span>
  <span class="typing-dot"></span>
  <span class="typing-dot"></span>
</div>
`;
chat.appendChild(loaderWrap);
chat.scrollTop = chat.scrollHeight;

try {
    // Run Orion's brain locally in the browser (no server needed)
    let charContext = charactersArray.length > 0
        ? "characters: " + charactersArray.join(", ") + ". "
        : "";

    const statusEl = document.getElementById("orionStatus");
    if(statusEl){
        statusEl.innerText = "🧠 Prompt profile: " + profile.genre + " • " + profile.tone + " • " + profile.setting;
    }

    const promptContext = [
        "Story brief:",
        "genre=" + profile.genre,
        "tone=" + profile.tone,
        "mood=" + profile.mood,
        "setting=" + profile.setting,
        "focus=" + profile.focus,
        "idea=" + generationPrompt,
        "rule=Do not print placeholder genre labels like [genre: modern_fantasy]. Keep the story in natural prose."
    ].join(" ");

    const generated = await generateOrionText(charContext + promptContext, 60, 0.8);

    // Remove typing element
    if(document.getElementById("orion-loader")) {
        document.getElementById("orion-loader").remove();
    }

    current.messages.push({sender:"orion", content: generated});
} catch (error) {
    console.error("Generation failed:", error);
    if(document.getElementById("orion-loader")) {
        document.getElementById("orion-loader").remove();
    }
    current.messages.push({sender:"orion", content: "❌ Orion's brain failed to generate a response. Check the browser console for details."});
}

save();
render();
}

function render(){
let chat=document.getElementById("chat");
chat.innerHTML="";
if(!current || current.messages.length === 0){
document.getElementById("chat").classList.add("hidden");
document.getElementById("welcome").classList.remove("hidden");
return;
}
document.getElementById("welcome").classList.add("hidden");
document.getElementById("chat").classList.remove("hidden");

current.messages.forEach(m=>{
let w=document.createElement("div");
w.className="message-wrap "+(m.sender==="user"?"user-wrap":"orion-wrap");
w.innerHTML=`
<div class="sender">${m.sender==="user"?"You":"⭐ Orion"}</div>
<div class="message ${m.sender}">${m.content}</div>
`;
chat.appendChild(w);
});
chat.scrollTop=chat.scrollHeight;
}

/* ===== REAL-TIME CHARACTER RETRIEVAL ===== */
function syncCharacters(){
document.getElementById("chars").innerHTML="";
if(!current) return;
current.chars.forEach((c, index)=>{
appendCharacterDOM(c, index);
});
}

function handleAddCharBtn(){
if(!current) createBook();
let newChar = {name:"", age:"", desc:"", role:"Main Character"};
current.chars.push(newChar);
save();
syncCharacters();
}

function appendCharacterDOM(data, index){
let d=document.createElement("div");
d.className="character";
d.innerHTML=`
<button class="delete-char-btn" onclick="deleteChar(${index})">✕</button>
<input placeholder="Name" value="${data.name||""}" oninput="updateCharData(${index}, 'name', this.value)">
<input placeholder="Age" value="${data.age||""}" oninput="updateCharData(${index}, 'age', this.value)">
<input placeholder="Description" value="${data.desc||""}" oninput="updateCharData(${index}, 'desc', this.value)">
<select onchange="updateCharData(${index}, 'role', this.value)">
<option ${data.role==="Main Character"?"selected":""}>Main Character</option>
<option ${data.role==="Sudo Main Character"?"selected":""}>Sudo Main Character</option>
<option ${data.role==="Side Character"?"selected":""}>Side Character</option>
<option ${data.role==="Main Antagonist"?"selected":""}>Main Antagonist</option>
<option ${data.role==="Sudo Antagonist"?"selected":""}>Sudo Antagonist</option>
<option ${data.role==="Background Antagonist"?"selected":""}>Background Antagonist</option>
</select>
`;
document.getElementById("chars").appendChild(d);
}

function updateCharData(index, key, value){
if(!current || !current.chars[index]) return;
current.chars[index][key] = value;
localStorage.setItem("orion", JSON.stringify(books)); 
}

function deleteChar(index){
if(!current) return;
current.chars.splice(index, 1);
save();
syncCharacters();
}

/* ===== INITIALIZATION ===== */
if(books.length > 0){
current = books[books.length - 1]; 
render();
syncCharacters();
} else {
updateSelect();
}
</script>
